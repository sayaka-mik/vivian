<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공동 탐사 시뮬레이터 V2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            color: #e0e0e0;
        }

body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* [추가] 모바일 주소창 높이에 맞춰 화면이 동적으로 변함 */
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            height: 100dvh; /* [추가] 100% 대신 dvh를 사용하여 잘림 완벽 방지 */
            max-height: 900px;
            background-color: #222;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        /* Screen States */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            padding: 20px;
        }
        .screen.active {
            display: flex;
        }

        /* Start Screen */
        #start-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #start-screen h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
/* Intro Screen */
        #intro-screen {
            padding: 20px;
            height: 100%; /* 화면 꽉 채우기 */
            position: relative; /* 버튼이 바닥에 붙을 수 있도록 기준점 설정 */
            overflow: hidden;
            box-sizing: border-box; /* 패딩을 포함해서 크기 계산 */
        }
        #intro-text {
            /* 전체 높이에서 하단 버튼이 들어갈 공간(약 70px)을 빼고 남은 영역만 차지 */
            height: calc(100% - 70px); 
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 0;
            white-space: pre-wrap;
            overflow-y: auto; /* 텍스트가 길면 이 안에서만 스크롤 됨 */
        }
        #btn-to-anim {
            position: absolute; /* 텍스트 길이와 무관하게 위치 강제 고정 */
            bottom: 20px; /* 바닥에서 20px 띄움 */
            left: 20px;
            width: calc(100% - 40px); /* 좌우 여백 20px씩 제외한 꽉 찬 너비 */
        }

        /* Anim Screen */
        #anim-screen {
            background-color: #000;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            overflow: hidden;
            transition: opacity 1s;
        }
        .glitch-word {
            position: absolute;
            font-weight: 900;
            white-space: nowrap;
            pointer-events: none;
        }
        #anim-center-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            display: none;
            z-index: 101;
            text-shadow: 2px 2px 5px red, -2px -2px 5px blue;
            white-space: nowrap;
        }
        .fade-out { opacity: 0; }

        /* Main Game Screen */
        #header {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        #profile-section {
            display: flex;
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        #profile-img {
            width: 120px;
            height: 120px;
            background-color: #000;
            border-radius: 4px;
            margin-right: 15px;
            object-fit: cover;
        }
        #profile-info {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .name { font-weight: bold; font-size: 1.1rem; color: #a4c8ff; margin-bottom: 5px; }
        .hp-text { color: #ff6b6b; font-weight: bold; margin-bottom: 5px; }
        .status-text { color: #bbb; margin-bottom: 10px; font-size: 0.85rem;}
        .stats-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .stats-grid span { background: #111; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;}
        .dynamic-effects { font-size: 0.75rem; color: #888; white-space: pre-wrap; }

    #event-section {
            background-color: #1e1e1e;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            min-height: 0; /* [핵심] Flexbox 내부에서 요소가 부모 밖으로 삐져나가는 것을 막아줌 */
            margin-bottom: 10px;
            overflow-y: auto; /* 박스 내부 스크롤 허용 */
            line-height: 1.5;
        }

        #action-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 10px;
            flex-shrink: 0; /* [핵심] 윗부분(상태창, 이벤트창)이 아무리 커져도 버튼 영역은 절대 찌그러지거나 잘리지 않음 */
        }
        
        .event-title { font-weight: bold; color: #ff6b6b; margin-bottom: 15px; }
        .event-desc { margin-bottom: 15px; white-space: pre-wrap; }

        #action-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 10px;
        }

        /* Buttons */
        button {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #444; }
        button:disabled { background-color: #222; color: #555; cursor: not-allowed; border-color: #333;}
        
        .primary-btn { background-color: #d32f2f; border-color: #ff5252; }
        .primary-btn:hover { background-color: #f44336; }
        
        #enemy-status { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #555; display: none; }

        /* --- 모바일 전용 UI 최적화 --- */
        @media (max-width: 600px) {
            .screen { padding: 15px; }
            
            /* 프로필(상태창) 영역 축소 */
            #profile-section { 
                padding: 10px; 
                margin-bottom: 10px; 
            }
            #profile-img { 
                width: 75px; 
                height: 75px; 
                margin-right: 10px; 
            }
            #profile-info { font-size: 0.8rem; }
            .name { font-size: 1rem; margin-bottom: 2px; }
            .stats-grid span { font-size: 0.7rem; padding: 2px 4px; }
            .dynamic-effects { font-size: 0.65rem; }

            /* 이벤트 텍스트 및 버튼 여백 조정 */
            #header { font-size: 1.2rem; margin-bottom: 10px; padding-bottom: 5px; }
            #event-section { padding: 15px; margin-bottom: 10px; font-size: 0.9rem; }
            button { padding: 12px; font-size: 0.95rem; }

            /* 인트로 및 애니메이션 화면 조정 */
            #intro-screen { padding: 20px 15px; }
            #intro-text { font-size: 0.9rem; min-height: 200px; }
            #anim-center-text { font-size: 2rem; }
        }
        
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1>공동 탐사 시뮬레이터 V2 0.26</h1>
        <button onclick="startGameIntro()">게임 시작</button>
    </div>

    <!-- Intro Text Screen -->
    <div id="intro-screen" class="screen">
        <div id="intro-text"></div>
        <button id="btn-to-anim" style="display:none;" onclick="startAnimation()">레테 공동으로 향한다</button>
    </div>

    <!-- Animation Screen -->
    <div id="anim-screen" class="screen" style="display:none; padding:0;">
        <div id="anim-container" style="position:relative; width:100%; height:100%;"></div>
        <div id="anim-center-text"></div>
    </div>

    <!-- Main Game Screen -->
    <div id="main-screen" class="screen">
        <div id="header">B 1</div>
        
        <div id="profile-section">
            <img id="profile-img" src="FACE-VIVIAN.jpg" alt="비비안 사진" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
            <div id="profile-info">
                <div class="name">비비안 밴시</div>
                <div class="hp-text" id="ui-hp">HP: 1 / 1</div>
                <div class="stats-grid">
                    <span>공격력: <span id="ui-atk">1</span></span>
                    <span>사랑: <span id="ui-love">1</span></span>
                    <span>데니: <span id="ui-denny">1</span></span>
                    <span>레조니움: <span id="ui-resonium">1</span></span>
                </div>
                <div class="dynamic-effects" id="ui-effects"></div>
            </div>
        </div>

        <div id="event-section">
            <div class="event-title" id="event-title"></div>
            <div class="event-desc" id="event-desc"></div>
            <div id="enemy-status"></div>
        </div>

        <div id="action-section"></div>
    </div>

</div>

<script>
    // --- 게임 상태 변수 ---
 let state = {
        floor: 1, baseMaxHp: 1, baseAtk: 1, hp: 1, love: 1, denny: 1, resonium: 1, bankLove: 0,
        eventState: 'IDLE', enemy: null,
        bonusRevive: 0
    };

    const maxLove = 1000;

    // 파생 스탯 계산기
    function getMaxHp() { return state.baseMaxHp + Math.floor(state.resonium / 2); }
    function getAtk() { return state.baseAtk + Math.floor(state.denny / 3); }
    function getReviveChance() { 
        return Math.min(100, Math.floor(state.love / 11) + state.bonusRevive); 
    }
    function getStrongEnemyChance() { return Math.min(100, Math.floor(state.love / 12)); }
    function getCritChance() { return Math.min(100, Math.floor(state.love / 16)); }

    // --- 유틸리티 ---
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function roll(chance) { return Math.random() * 100 < chance; }
    function appendLog(text) { 
        document.getElementById('event-desc').innerHTML += `<br><br>${text}`;
        const eventSec = document.getElementById('event-section');
        eventSec.scrollTop = eventSec.scrollHeight;
    }
    function setEventTitle(text) { document.getElementById('event-title').innerText = text; }
    function setEventDesc(text) { document.getElementById('event-desc').innerHTML = text; }
    
    function clearButtons() { document.getElementById('action-section').innerHTML = ''; }
    function addButton(text, onClick) {
        const btn = document.createElement('button');
        btn.innerText = text;
        btn.onclick = onClick;
        document.getElementById('action-section').appendChild(btn);
    }

    // --- UI 업데이트 ---
    function updateUI() {
        if(state.love > maxLove) state.love = maxLove;
        if(state.love < 0) state.love = 0;
        if(state.hp > getMaxHp()) state.hp = getMaxHp();
        if(state.hp < 0) state.hp = 0;

        document.getElementById('header').innerText = `B ${state.floor}`;
        document.getElementById('ui-hp').innerText = `HP: ${state.hp} / ${getMaxHp()}`;
        document.getElementById('ui-atk').innerText = getAtk();
        document.getElementById('ui-love').innerText = state.love;
        document.getElementById('ui-denny').innerText = state.denny;
        document.getElementById('ui-resonium').innerText = state.resonium;

let baseRevive = Math.floor(state.love / 11);

        let effects = [];
        effects.push(`[저를 비비안이라 불러주세요] 부활 확률이 ${baseRevive}% 상승했습니다.`);
        
        // 추가 부활 버프가 0보다 클 때만 한 줄을 추가
        if(state.bonusRevive > 0) {
            effects.push(`[파에톤의 노래(DISC)] 부활 확률이 추가로 ${state.bonusRevive}% 상승했습니다.`);
        }
        
        effects.push(`[갈대 숲의 바람]이 불어올 확률이 ${getStrongEnemyChance()}% 상승했습니다.`);
        effects.push(`[파에톤의 노래] 비비안 밴시의 난개 발동 확률이 ${getCritChance()}% 상승했습니다.`);
        document.getElementById('ui-effects').innerText = effects.join('\n');
    }

    // --- 인트로 및 연출 ---
    const introTextRaw = `오늘 파에톤이 죽었다. 어쩌면 어제. 비비안 밴시는 폐인이 되어 뉴에리두 골목길에 넝마주이처럼 널브러져 있었다. 누군가 그녀를 건드려도, 비비안 밴시는 반응하지도 않았다.

이제 이 삶에 무슨 의미가 있을까? 계절이 속절없이 흐르고, 비비안을 찾아온 휴고 블라드는, 막상 말을 걸지는 않고 뜸을 들인다. 휴고는 비비안이 자신에게 눈길조차 주지 않자 한숨을 내쉬고는 말한다.

"비비안, 야누스 구역에 새로운 공동이 발생한 걸 알고 있어?"
"......."
"...들리는 소문에 의하면, 그곳에서 그 두 남매를 봤다는-"

비비안 밴시는 삐거덕거리는 몸을 일으켰다.
"......."

그녀는 아무 말도 하지 않았다. 그저 야누스 구역에 발생했다는 새로운 공동으로 항했을 뿐이다. 파에톤 님이 정말 살아있는지, 혹은 휴고가 자신을 속이러 한 것인지, 그런 생각은 그녀의 머릿속에 존재하지 않았다. 모든 생각도 감정도 사라진 비비안에게 진실이나 의도 따위는 하등 필요 없는 것이었다.

파에톤이 정말 그곳에 있는지, 없는지. 중요치 않다. 중요한 건 비비안 밴시는 그곳으로 갈 수밖에 없다는 것이었다.

지나가는 길거리에서는 '레테 공동의 20층에 도착하면 시간을 되돌릴 수 있다'는 헛소문에 대해 떠드는 사람들의 목소리가 들려온다. 비비안 밴시의 두 눈에서 눈물이 흘러 내린다.

그녀는 레테 공동으로 뛰어들었다.
부디 그녀에게, 행운의 여신이 깃들기를.`;

function showScreen(id) {
        // 모든 스크린의 active 클래스를 제거하고, 강제로 주입된 인라인 스타일을 초기화합니다.
        document.querySelectorAll('.screen').forEach(el => {
            el.classList.remove('active');
            el.style.display = ''; // 이전 화면들에 남아있는 display: flex/none 속성 제거
        });
        
        // CSS의 .screen.active { display: flex; } 규칙에 따라 화면이 표시되도록 합니다.
        document.getElementById(id).classList.add('active');
    }
// --- 인트로 텍스트 스킵을 위한 전역 변수 ---
    let isIntroSkipped = false;

    async function startGameIntro() {
        showScreen('intro-screen');
        const textEl = document.getElementById('intro-text');
        const btnEl = document.getElementById('btn-to-anim');
        textEl.innerText = '';
        btnEl.style.display = 'none'; // 재시작 시 버튼 숨김
        isIntroSkipped = false; // 스킵 상태 초기화
        
        // 화면 클릭 시 스킵 처리하는 이벤트 리스너 추가
        const introScreenEl = document.getElementById('intro-screen');
        const skipHandler = () => {
            isIntroSkipped = true;
        };
        introScreenEl.addEventListener('click', skipHandler);

        for (let i = 0; i < introTextRaw.length; i++) {
            // 스킵이 발동되면 전체 텍스트를 바로 출력하고 루프 종료
            if (isIntroSkipped) {
                textEl.innerText = introTextRaw;
                break;
            }

            textEl.innerHTML += introTextRaw[i];
            let delay = introTextRaw[i] === '.' || introTextRaw[i] === '?' || introTextRaw[i] === '\n' ? 30 : 25;
            await new Promise(r => setTimeout(r, delay));
            
            if(i % 10 === 0) textEl.scrollIntoView({ behavior: "smooth", block: "end" });
        }
        
        // 이벤트 리스너 제거 및 버튼 표시
        introScreenEl.removeEventListener('click', skipHandler);
        btnEl.style.display = 'block';
        textEl.scrollIntoView({ behavior: "smooth", block: "end" }); // 전체 출력 후 최하단으로 스크롤
    }

    const zzzKeywords = ["젠레스 존 제로", "ZENLESS ZONE ZERO", "ゼンレスゾーンゼロ", "绝区零", "렘니안 공동", "야누스 구역", "RAMDOM PLAY", "비비안", "VIVIAN", "로프꾼", "파에톤님", "벨", "와이즈", "헬리오스", "예언", "저주", "사랑", "파에톤", "레테 공동", "제로공동", "화이트스타", "BANGBOO", "공허사냥꾼", "레조니움", "에테리얼"];

    async function startAnimation() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('anim-screen').style.display = 'block';
        const container = document.getElementById('anim-container');
        const centerText = document.getElementById('anim-center-text');
        
        centerText.style.display = 'none';
        centerText.innerText = '';

        let glitchInterval = setInterval(() => {
            let span = document.createElement('span');
            span.className = 'glitch-word';
            span.innerText = zzzKeywords[Math.floor(Math.random() * zzzKeywords.length)];
            span.style.left = Math.random() * 90 + '%';
            span.style.top = Math.random() * 90 + '%';
            span.style.color = Math.random() > 0.8 ? '#ff4444' : (Math.random() > 0.5 ? '#55aaff' : '#555');
            span.style.opacity = Math.random();
            span.style.fontSize = (Math.random() * 1.5 + 0.5) + 'rem';
            container.appendChild(span);
            setTimeout(() => span.remove(), 150);
        }, 30);

        await new Promise(r => setTimeout(r, 2000));
        clearInterval(glitchInterval);
        container.innerHTML = '';

        centerText.style.display = 'block';
        centerText.innerText = '파에톤';
        await new Promise(r => setTimeout(r, 350));
        centerText.innerText += ' 님';

        await new Promise(r => setTimeout(r, 1000));
        
        document.getElementById('anim-screen').classList.add('fade-out');
        await new Promise(r => setTimeout(r, 1000));
        document.getElementById('anim-screen').classList.remove('fade-out');
        document.getElementById('anim-screen').style.display = 'none';
        
        startGame();
    }

    // --- 메인 게임 로직 ---
    function startGame() {
        showScreen('main-screen');
        updateUI();
        processFloor();
    }

function processFloor() {
        updateUI();
        if(state.floor >= 20) {
            winGame();
            return;
        }

        clearButtons();
        document.getElementById('enemy-status').style.display = 'none';
        state.eventState = 'IDLE';

        if(state.floor === 1) {
            runFloor1Event();
        } else {
            let loveGain = rand(21, 48);
            state.love += loveGain;
            
            if(state.love > maxLove) {
                state.love = maxLove;
            }

            // 데니와 레조니움으로 얻는 보정치 계산
            let atkBonus = Math.floor(state.denny / 3);
            let hpBonus = Math.floor(state.resonium / 2);

            // 사랑 수치에 의한 확률만 별도 분리
            let baseRevive = Math.floor(state.love / 11);
            let strongProb = getStrongEnemyChance();
            let critProb = getCritChance();

            setEventTitle(`[층 진입]`);
            
            // 텍스트 조립 (색상 및 줄바꿈 적용)
            let descHtml = `<span style="color: #ffb6c1;">[소네트] 비비안 밴시가 파에톤의 기억을 떠올립니다. 이번 층에서 사랑이 ${loveGain} 상승하였습니다.</span>\n`;

function rollRandomEvent() {
        clearButtons();
        let isEarlyFloor = state.floor <= 4;

        if(!isEarlyFloor && roll(3)) { startCombat('special'); return; }
        if(!isEarlyFloor && roll(getStrongEnemyChance())) {
            appendLog(`<span style="color: #cd853f;">"[갈대 숲의 바람]이 발동하여 이번 층에서 강적을 조우합니다!"</span>`);
            startCombat('strong'); return;
        }

        let r = rand(1, 100);
        if(r <= 40) { 
            if(!isEarlyFloor && roll(20)) startCombat('strong');
            else startCombat('normal');
        } else if(r <= 80) { // 사건 40%
            // [수정된 부분] 5가지 사건 중 하나를 랜덤으로 실행
            const events = [runEventBangboo, runEventCissia, runEventWhiteStar, runEventSong, runEventRaider, runEventMarcel, runEventSeed, runEventNicole];
            let chosenEvent = events[rand(0, events.length - 1)];
            chosenEvent();
        } else { // 은행 20%
            runEventBank();
        }
    }

    // --- 전투 로직 ---
    function startCombat(type) {
        state.eventState = 'COMBAT';
        let enemy = { type: type, hp: 0, maxHp: 0, atk: 0, luck: 0, name: "" };

        if(type === 'normal') {
            const names = ["에테리얼", "침식체", "레이더", "불량-Bangboo", "폭주한 스마트 구조체", "야성적인 시렌"];
            enemy.name = names[rand(0, names.length-1)];
            enemy.hp = enemy.maxHp = rand(15, 30);
            enemy.atk = rand(7, 19);
            enemy.luck = rand(0, 200);
        } else {
            const names = ["니네베", "미아즈마 프리스트", "새크리파이스", "제페토", "죽음의 도살자"];
            let baseName = names[rand(0, names.length-1)];
            if(type === 'special') {
                const prefixes = ["뒤틀린 ", "미친 ", "강화된 "];
                enemy.name = "[강적] " + prefixes[rand(0, prefixes.length-1)] + baseName;
                enemy.luck = 999;
            } else {
                enemy.name = "[강적] " + baseName;
                enemy.luck = rand(200, 400);
            }
            enemy.hp = enemy.maxHp = rand(99, 218);
            enemy.atk = rand(29, 88);
            
            // 11층 이상 행운 보정
            if(state.floor >= 11 && type !== 'special') {
                enemy.luck = roll(50) ? rand(419, 776) : rand(711, 899);
            }
        }
        
        state.enemy = enemy;
        setEventTitle(`[전투 발생: ${enemy.name}]`);
        setEventDesc(`적이 앞을 가로막습니다.`);
        updateEnemyUI();
        document.getElementById('enemy-status').style.display = 'block';

        clearButtons();
        let playerFirst = roll(50);
        appendLog(playerFirst ? "비비안이 선공권을 갖습니다." : "적이 선공권을 갖습니다.");
        
        if(!playerFirst) {
            setTimeout(enemyTurn, 1000);
        } else {
            renderCombatButtons();
        }
    }

    function updateEnemyUI() {
        const est = document.getElementById('enemy-status');
        est.innerHTML = `<strong>적: ${state.enemy.name}</strong><br>HP: ${state.enemy.hp} / ${state.enemy.maxHp}<br>공격력: ${state.enemy.atk}<br>행운: ${state.enemy.luck}`;
    }

    function renderCombatButtons() {
        clearButtons();
        addButton("방해되는 것을 치운다", () => playerAttack());
        addButton("공세에 나선다", () => playerAttack());
    }

    function playerAttack() {
        clearButtons();
        let isCrit = roll(getCritChance());
    let dmg = isCrit ? (getAtk() + rand(150, 210)) : getAtk();
        
        if(isCrit) appendLog(`\n<span style="color: #ffd700;">[파에톤의 노래] 난개가 발동했습니다! 적에게 ${dmg}의 피해!</span>`);
        else appendLog(`\n비비안의 공격! 적에게 ${dmg}의 피해.`);

        state.enemy.hp -= dmg;
        updateEnemyUI();

        if(state.enemy.hp <= 0) {
            setTimeout(checkEnemyDeath, 800);
        } else {
            setTimeout(enemyTurn, 800);
        }
    }

    function enemyTurn() {
        if(state.hp <= 0) return; // 이미 죽었으면 무시

        let dmg = state.enemy.atk;
        state.hp -= dmg;
        
        let hitTexts = ["묵직한 고통이 느껴진다.", "이를 악물고 버틴다.", "파에톤 님, 어디 계신가요.", "희망을 잃어간다."];
        appendLog(`\n적의 공격! ${hitTexts[rand(0,1)]} (${dmg} 피해)`);
        
        updateUI();

        if(state.hp <= 0) {
            setTimeout(checkPlayerDeath, 800);
        } else {
            renderCombatButtons();
        }
    }

    function checkEnemyDeath() {
        let reviveChance = Math.floor(state.enemy.luck / 12);
        if(roll(reviveChance)) {
            state.enemy.luck -= 70;
            if(state.enemy.luck < 0) state.enemy.luck = 0;
            state.enemy.maxHp = Math.floor(state.enemy.maxHp * 1.1);
            state.enemy.hp = state.enemy.maxHp;
            state.enemy.atk = Math.floor(state.enemy.atk * 1.1);
            
            appendLog(`\n\n<span style="color: #ff4444;">적의 행운이 작용했습니다! 적이 더 강해진 상태로 부활합니다!\n강회된 적은 더 큰 보상을 제공합니다.</span>`);
            updateEnemyUI();
            renderCombatButtons();
        } else {
            appendLog(`\n전투 승리! 적을 물리쳤습니다.`);
            giveCombatReward();
            finishEvent();
        }
    }

function checkPlayerDeath() {
        if(roll(getReviveChance())) {
            let loveDrop = rand(37, 117);
            state.love -= loveDrop;
            state.hp = Math.floor(getMaxHp() * 0.5);
            
            appendLog(`\n\n<span style="color: #add8e6;">[저를 비비안이라 불러주세요.] 비비안 밴시가 죽음을 거부합니다.\n(HP 50% 회복, 비비안의 사랑 수치가 ${loveDrop} 감소했습니다.)</span>`);
            updateUI();
            renderCombatButtons();
        } else {
            appendLog(`\n<span style="color: #ff4444;">비비안 밴시는 쓰러졌습니다... [GAME OVER]</span>`);
            clearButtons();
            // 재시작 버튼 추가
            addButton("시간을 되돌린다.", () => {
                resetGame();
            });
        }
    }

    function giveCombatReward() {
        if(state.enemy.type === 'normal') {
            if(roll(50)) {
                let d = rand(2, 18); state.denny += d; appendLog(`보상으로 데니 ${d}개 획득.`);
            } else {
                let r = rand(1, 7); state.resonium += r; appendLog(`보상으로 레조니움 ${r}개 획득.`);
            }
        } else { // 강적 및 특수강적 보상
            if(roll(50)) {
                let d = rand(20, 50); state.denny += d; appendLog(`보상으로 데니 ${d}개 획득.`);
            } else {
                let r = rand(10, 20); state.resonium += r; appendLog(`보상으로 레조니움 ${r}개 획득.`);
            }
        }
        updateUI();
    }

    function finishEvent() {
        clearButtons();
        addButton("다음 층으로", () => {
            state.floor++;
            processFloor();
        });
    }

// --- 엔딩 텍스트 스킵을 위한 전역 변수 ---
    let isEndingSkipped = false;

    async function winGame() {
        setEventTitle("[공동 20층 도착]");
        const textEl = document.getElementById('event-desc');
        textEl.innerHTML = ''; // 기존 텍스트 지우기
        clearButtons(); // 기존 버튼 모두 숨기기
        
        const endingTextRaw = `레테 공동의 20층, 텅 비어있는 것 같은 황야에 비비안 밴시는 발을 들였다.\n헛소문이었던걸까?\n아마 그럴 것이다. 공동에서는 어떤 신비로운 일들이라도 일어난다고 하지만, 죽은 사람이 되살아난다거나 시간을 돌리는 일 따위는...\n"비비안?"\n그리운 목소리에 비비안 밴시는 고개를 돌렸다.\n\n태양보다 찬란한 빛이 공동을 비추고, 마침내 비비안은 파에톤과 재회했다.\n\n모든 시련을 이겨내고 마침내 목적지에 도달했습니다.`;

        isEndingSkipped = false; // 스킵 상태 초기화

        // 화면(이벤트 섹션) 클릭 시 스킵 처리하는 이벤트 리스너
        const eventSec = document.getElementById('event-section');
        const skipHandler = () => {
            isEndingSkipped = true;
        };
        eventSec.addEventListener('click', skipHandler);

        // 타이핑 효과 루프
        for (let i = 0; i < endingTextRaw.length; i++) {
            // 스킵이 발동되면 전체 텍스트를 바로 출력하고 루프 종료
            if (isEndingSkipped) {
                textEl.innerHTML = endingTextRaw;
                break;
            }

            textEl.innerHTML += endingTextRaw[i];
            
            // 마침표나 줄바꿈에서는 조금 더 길게 쉬어가는 딜레이
            let delay = endingTextRaw[i] === '.' || endingTextRaw[i] === '?' || endingTextRaw[i] === '\n' ? 50 : 30;
            await new Promise(r => setTimeout(r, delay));
            
            // 텍스트가 길어지면 자동으로 아래로 스크롤
            if(i % 5 === 0) eventSec.scrollTop = eventSec.scrollHeight;
        }

        // 텍스트 출력이 끝났으므로 이벤트 리스너 제거
        eventSec.removeEventListener('click', skipHandler);
        eventSec.scrollTop = eventSec.scrollHeight; // 최종 스크롤 하단 고정
        
        // 텍스트 출력이 모두 끝난 뒤에 비로소 재시작 버튼 표시
        addButton("다시 한 번 탐사 시작하기", () => {
            resetGame();
        });
    }

// --- 게임 초기화 로직 ---
function resetGame() {
        state = {
            floor: 1, baseMaxHp: 1, baseAtk: 1, hp: 1, love: 1, denny: 1, resonium: 1, bankLove: 0,
            eventState: 'IDLE', enemy: null,
            bonusRevive: 0
        };
        
        // 텍스트 로그 초기화
        document.getElementById('event-desc').innerHTML = '';
        document.getElementById('enemy-status').style.display = 'none';
        
        // 시작 화면으로 돌려보내기
        showScreen('start-screen');
    }

</script>
